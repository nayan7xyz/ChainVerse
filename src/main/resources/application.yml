server:
  port: 8080

spring:

  application:
    name: ChainVerse Sentinel

  datasource:
    url: jdbc:h2:file:./database/chainverse
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update

    show-sql: true

    properties:
      hibernate:
        format_sql: true

logging:

  level:
    root: INFO
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG